<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zeroed — Accounts</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="page">
  <div class="top-bar flex-between">
    <div>
      <h1>Accounts</h1>
      <div class="sub" id="summary-sub"></div>
    </div>
    <button class="btn btn-primary btn-sm" id="add-btn" onclick="openPlaidLink()">+ Add Bank</button>
  </div>

  <div class="content">
    <div class="pills">
      <button class="pill active" data-filter="all">All</button>
      <button class="pill" data-filter="credit">Credit Cards</button>
      <button class="pill" data-filter="depository">Checking</button>
    </div>

    <div id="page-loading" class="loading-state">
      <div class="spinner"></div>
      <p>Loading accounts…</p>
    </div>
    <div id="page-error" class="error-state" style="display:none">
      <div class="error-icon">⚠️</div>
      <p>Could not load accounts</p>
      <small id="error-msg">Check that the server is running</small>
      <button class="btn btn-primary" onclick="loadAccounts()">Try Again</button>
    </div>
    <div id="page-content" style="display:none">
      <div id="accounts-list"></div>
      <div id="empty-state" style="display:none">
        <div class="empty">
          <div class="empty-icon">💳</div>
          <p>No accounts connected</p>
          <small>Tap "+ Add Bank" to link your first account</small>
        </div>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </a>
    <a href="accounts.html" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
      <span>Accounts</span>
    </a>
    <a href="plan.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
      <span>Plan</span>
    </a>
    <a href="goals.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
      <span>Goals</span>
    </a>
    <a href="activity.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <span>Activity</span>
    </a>
    <a href="settings.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l-.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span>Settings</span>
    </a>
  </nav>
</div>

<script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
<script>
const fmtD = n => new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',minimumFractionDigits:2,maximumFractionDigits:2}).format(n);
const fmt  = n => new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(n);

let allAccounts = [];

function show(state) {
  document.getElementById('page-loading').style.display = state==='loading' ? 'block' : 'none';
  document.getElementById('page-error').style.display   = state==='error'   ? 'block' : 'none';
  document.getElementById('page-content').style.display = state==='content' ? 'block' : 'none';
}

function dueBadge(dueDate) {
  if (!dueDate) return '';
  const due  = new Date(dueDate+'T12:00');
  const days = Math.ceil((due-new Date())/86400000);
  if (days < 0)  return '<span class="badge badge-red">Overdue</span>';
  if (days <= 5) return `<span class="badge badge-yellow">Due in ${days}d</span>`;
  return `<span class="badge badge-green">Due ${due.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>`;
}

function renderAccounts(list) {
  const empty = document.getElementById('empty-state');
  if (!list.length) { document.getElementById('accounts-list').innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';
  document.getElementById('accounts-list').innerHTML = list.map(a => {
    const bal  = a.balance_current||0, lim = a.credit_limit||0;
    const util = lim>0 ? Math.min(100,Math.round(bal/lim*100)) : 0;
    const fillClass = util>70?'red':util>30?'yellow':'green';
    const isCredit  = a.type==='credit';
    const promoBadge = a.is_promotional_apr && a.promo_apr_expiry_date
      ? `<span class="badge badge-yellow">Promo ${a.apr}% APR</span>` : '';
    return `<div class="account-card">
      <div class="acct-header">
        <div class="acct-name">${a.name}</div>
        <div class="acct-balance">${fmtD(bal)}</div>
      </div>
      <div class="acct-meta">
        ${isCredit&&a.apr?`<span>APR <strong>${a.apr}%</strong></span>`:''}
        ${isCredit&&a.minimum_payment?`<span>Min <strong>${fmtD(a.minimum_payment)}</strong></span>`:''}
        ${lim?`<span>Limit <strong>${fmt(lim)}</strong></span>`:''}
        ${a.institution_name?`<span>${a.institution_name}</span>`:''}
      </div>
      ${isCredit&&lim?`<div class="progress-wrap" style="margin:0 0 8px">
        <div class="progress-bar"><div class="progress-fill ${fillClass}" style="width:${util}%"></div></div>
        <div class="progress-labels"><span>${util}% utilized</span></div>
      </div>`:''}
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${isCredit?dueBadge(a.payment_due_date):''}
        ${promoBadge}
        <span class="badge badge-gray">${a.type==='credit'?'Credit':'Checking'}</span>
      </div>
    </div>`;
  }).join('');
}

function applyFilter(f) {
  document.querySelectorAll('.pill').forEach(p=>p.classList.toggle('active',p.dataset.filter===f));
  renderAccounts(f==='all' ? allAccounts : allAccounts.filter(a=>a.type===f));
}

async function loadAccounts() {
  show('loading');
  try {
    allAccounts = await fetch('/api/plaid/accounts').then(r => {
      if (!r.ok) throw new Error(`Server returned ${r.status}`);
      return r.json();
    });
    const credits   = allAccounts.filter(a=>a.type==='credit');
    const totalDebt = credits.reduce((s,a)=>s+(a.balance_current||0),0);
    document.getElementById('summary-sub').textContent = `${allAccounts.length} accounts · ${fmt(totalDebt)} total debt`;
    applyFilter(document.querySelector('.pill.active')?.dataset.filter||'all');
    show('content');
  } catch (e) {
    document.getElementById('error-msg').textContent = e.message;
    show('error');
  }
}

document.querySelectorAll('.pill').forEach(p=>p.addEventListener('click',()=>applyFilter(p.dataset.filter)));

async function openPlaidLink() {
  const btn = document.getElementById('add-btn');
  btn.textContent='Loading…'; btn.disabled=true;
  try {
    const { link_token } = await fetch('/api/plaid/create-link-token',{method:'POST'}).then(r=>r.json());
    Plaid.create({
      token: link_token,
      onSuccess: async (public_token, meta) => {
        btn.textContent='Connecting…';
        await fetch('/api/plaid/exchange-token',{
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ public_token, institution_name:meta.institution?.name, institution_id:meta.institution?.institution_id }),
        });
        await loadAccounts();
      },
      onExit: ()=>{},
    }).open();
  } catch(e) { alert('Could not start bank connection: '+e.message); }
  finally { btn.textContent='+ Add Bank'; btn.disabled=false; }
}

loadAccounts();
</script>
</body>
</html>
