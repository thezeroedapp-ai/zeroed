<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Zeroed — Recommend</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .category-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }
    .cat-btn {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 4px; padding: 10px 4px; border-radius: 10px; border: 1.5px solid var(--border);
      background: var(--white); cursor: pointer; font-size: 11px; font-weight: 500;
      color: var(--text-sm); transition: all .15s; -webkit-tap-highlight-color: transparent;
      font-family: inherit;
    }
    .cat-btn .icon { font-size: 22px; line-height: 1; }
    .cat-btn.active {
      border-color: var(--blue); background: var(--blue-light); color: var(--blue);
    }
    .amount-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 16px;
    }
    .amount-row label { font-size: 13px; font-weight: 600; white-space: nowrap; color: var(--text); }
    .amount-input {
      flex: 1; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 15px; font-family: inherit; color: var(--text); background: var(--white);
      outline: none;
    }
    .amount-input:focus { border-color: var(--blue); }

    .rec-card {
      background: var(--white); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 14px var(--pad);
      margin-bottom: 8px; position: relative;
    }
    .rec-card.rank-1 { border-color: #d4af37; }
    .rec-rank {
      position: absolute; top: 12px; right: 12px;
      font-size: 11px; font-weight: 700; padding: 2px 8px;
      border-radius: 999px; background: var(--gray-light); color: var(--text-sm);
    }
    .rec-rank.gold   { background: #fef3c7; color: #92400e; }
    .rec-rank.silver { background: #f1f5f9; color: #475569; }
    .rec-rank.bronze { background: #fff7ed; color: #9a3412; }
    .rec-name  { font-size: 15px; font-weight: 700; margin-bottom: 2px; padding-right: 60px; }
    .rec-rate  { font-size: 22px; font-weight: 800; color: var(--blue); margin: 6px 0 2px; }
    .rec-rate span { font-size: 13px; font-weight: 500; color: var(--text-sm); }
    .rec-detail { font-size: 12px; color: var(--text-sm); margin-bottom: 4px; }
    .rec-notes  { font-size: 11px; color: var(--text-sm); line-height: 1.5; }
    .rec-earn   { font-size: 13px; font-weight: 600; color: var(--green); margin: 4px 0; }
    .debt-badge {
      display: inline-block; font-size: 10px; font-weight: 600;
      background: var(--yellow-light); color: var(--yellow);
      border-radius: 6px; padding: 2px 7px; margin-bottom: 4px;
    }
    .unmatched-note {
      font-size: 12px; color: var(--text-sm); text-align: center;
      padding: 8px 0; line-height: 1.5;
    }
    .updated-note {
      font-size: 11px; color: var(--text-sm); text-align: center;
      margin-top: 12px; padding-bottom: 4px;
    }
    .no-results {
      text-align: center; padding: 40px 20px;
      font-size: 14px; color: var(--text-sm); line-height: 1.6;
    }
  </style>
</head>
<body>
<div class="page">
  <div class="top-bar">
    <h1>Card Recommender</h1>
    <div class="sub">Which card earns the most for this purchase?</div>
  </div>

  <div class="content">
    <!-- Spinner / error states -->
    <div id="page-loading" style="display:none;text-align:center;padding:60px 20px">
      <div style="font-size:28px;margin-bottom:12px">⏳</div>
      <div style="font-size:14px;color:var(--text-sm)">Loading your cards…</div>
    </div>
    <div id="page-error" style="display:none;text-align:center;padding:60px 20px">
      <div style="font-size:28px;margin-bottom:12px">⚠️</div>
      <div id="error-msg" style="font-size:14px;color:var(--text-sm)">Something went wrong.</div>
    </div>

    <div id="page-content" style="display:none">
      <!-- Category picker -->
      <div class="section-title">Spend Category</div>
      <div class="category-grid" id="cat-grid"></div>

      <!-- Amount (optional) -->
      <div class="amount-row">
        <label for="amount-input">Amount</label>
        <input id="amount-input" class="amount-input" type="number" min="1" step="1"
               placeholder="$ optional" inputmode="decimal">
      </div>

      <!-- Results -->
      <div id="results"></div>

      <div class="updated-note" id="updated-note"></div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </a>
    <a href="accounts.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
      <span>Accounts</span>
    </a>
    <a href="plan.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
      <span>Plan</span>
    </a>
    <a href="goals.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
      <span>Goals</span>
    </a>
    <a href="recommend.html" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      <span>Reward</span>
    </a>
    <a href="activity.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <span>Activity</span>
    </a>
    <a href="settings.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l-.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span>Settings</span>
    </a>
  </nav>
</div>

<script>
const $ = id => document.getElementById(id);

const CATS = [];
let activeCategory = null;
let debounceTimer  = null;

function show(state) {
  $('page-loading').style.display = state === 'loading'  ? '' : 'none';
  $('page-error').style.display   = state === 'error'    ? '' : 'none';
  $('page-content').style.display = state === 'content'  ? '' : 'none';
}

async function init() {
  show('loading');
  try {
    const r = await fetch('/api/recommendations/categories');
    if (!r.ok) throw new Error('Failed to load categories');
    const { categories, profilesLastUpdated } = await r.json();
    CATS.push(...categories);
    buildCategoryGrid();
    $('updated-note').textContent = `Reward profiles last updated: ${profilesLastUpdated} · Valuations via The Points Guy`;
    show('content');
    // Auto-load dining as default
    selectCategory('dining');
  } catch (e) {
    $('error-msg').textContent = e.message;
    show('error');
  }
}

function buildCategoryGrid() {
  const grid = $('cat-grid');
  grid.innerHTML = CATS.map(c => `
    <button class="cat-btn" id="cat-${c.id}" onclick="selectCategory('${c.id}')">
      <span class="icon">${c.icon}</span>
      <span>${c.label}</span>
    </button>
  `).join('');
}

function selectCategory(id) {
  if (activeCategory === id) return;
  activeCategory = id;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  const btn = $(`cat-${id}`);
  if (btn) btn.classList.add('active');
  fetchResults();
}

$('amount-input').addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(fetchResults, 400);
});

async function fetchResults() {
  if (!activeCategory) return;
  const amount = $('amount-input').value;
  const url = `/api/recommendations?category=${activeCategory}${amount ? '&amount=' + encodeURIComponent(amount) : ''}`;

  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error('Failed to fetch recommendations');
    const data = await r.json();
    renderResults(data);
  } catch (e) {
    $('results').innerHTML = `<div class="no-results">⚠️ ${e.message}</div>`;
  }
}

function rankClass(rank) {
  if (rank === 1) return 'gold';
  if (rank === 2) return 'silver';
  if (rank === 3) return 'bronze';
  return '';
}

function rankLabel(rank) {
  if (rank === 1) return '🥇 Best';
  if (rank === 2) return '🥈 2nd';
  if (rank === 3) return '🥉 3rd';
  return `#${rank}`;
}

function rewardLabel(r) {
  if (r.rewardType === 'cashback') return `${r.effectiveRate}% cash back`;
  return `${r.multiplier}x ${r.programName} (${r.effectiveRate}% value)`;
}

function renderResults(data) {
  const recs = data.recommendations;
  if (!recs.length) {
    $('results').innerHTML = `
      <div class="no-results">
        <div style="font-size:32px;margin-bottom:12px">🃏</div>
        <div>No connected cards matched a reward profile.</div>
        <div style="margin-top:6px">Connect your cards in <a href="accounts.html" style="color:var(--blue)">Accounts</a> or check back after linking more banks.</div>
      </div>`;
    return;
  }

  const amount = data.amount;
  let html = recs.map(r => {
    const earnLine = (r.earnedDollars !== null && !r.penalized)
      ? `<div class="rec-earn">Earn $${r.earnedDollars.toFixed(2)} on this purchase</div>`
      : r.earnedDollars !== null && r.penalized
        ? `<div class="rec-earn" style="color:var(--yellow)">~$${(r.earnedDollars / 0.5).toFixed(2)} if not carrying a balance</div>`
        : '';

    return `
    <div class="rec-card ${r.rank === 1 ? 'rank-1' : ''}">
      <div class="rec-rank ${rankClass(r.rank)}">${rankLabel(r.rank)}</div>
      <div class="rec-name">${r.accountName}</div>
      ${r.penalized ? `<div class="debt-badge">⚠️ Active balance — ranked lower</div>` : ''}
      <div class="rec-rate">${r.effectiveRate}%<span> effective back</span></div>
      <div class="rec-detail">${rewardLabel(r)}</div>
      ${earnLine}
      <div class="rec-notes">${r.notes}</div>
    </div>`;
  }).join('');

  if (data.unmatchedAccounts.length) {
    html += `<div class="unmatched-note">Cards not in reward database: ${data.unmatchedAccounts.join(', ')}</div>`;
  }

  $('results').innerHTML = html;
}

init();
</script>
</body>
</html>
