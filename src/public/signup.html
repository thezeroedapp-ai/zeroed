<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Zeroed — Create Account</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="auth.js"></script>
  <style>
    .auth-wrap {
      max-width: 480px; margin: 0 auto; min-height: 100dvh;
      background: var(--bg); display: flex; flex-direction: column;
      justify-content: center; padding: 32px var(--pad);
    }
    .auth-logo { text-align: center; margin-bottom: 32px; }
    .auth-logo h1 { font-size: 28px; font-weight: 800; color: var(--blue); }
    .auth-logo p { font-size: 14px; color: var(--text-sm); margin-top: 4px; }
    .auth-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); }
    .auth-card h2 { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; }
    .field input {
      width: 100%; padding: 10px 12px; border: 1px solid var(--border);
      border-radius: 8px; font-size: 15px; background: var(--white);
      transition: border-color .15s;
    }
    .field input:focus { outline: none; border-color: var(--blue); }
    .btn-primary {
      width: 100%; padding: 12px; background: var(--blue); color: #fff;
      border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
      cursor: pointer; margin-top: 4px;
    }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; }
    .divider { display: flex; align-items: center; gap: 10px; margin: 16px 0; color: var(--text-sm); font-size: 12px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .btn-google {
      width: 100%; padding: 11px; background: var(--white); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px; font-size: 14px;
      font-weight: 500; cursor: pointer; display: flex; align-items: center;
      justify-content: center; gap: 10px;
    }
    .btn-google:hover { background: var(--gray-light); }
    .auth-footer { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-sm); }
    .auth-footer a { color: var(--blue); text-decoration: none; font-weight: 600; }
    .error-msg { background: var(--red-light); color: var(--red); border-radius: 8px; padding: 10px 12px; font-size: 13px; margin-bottom: 14px; display: none; }
    .success-msg { background: var(--green-light); color: var(--green); border-radius: 8px; padding: 10px 12px; font-size: 13px; margin-bottom: 14px; display: none; }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-logo">
      <h1>Zeroed</h1>
      <p>Know exactly when you'll be debt-free.</p>
    </div>

    <div class="auth-card">
      <h2>Create account</h2>
      <div class="error-msg" id="error"></div>
      <div class="success-msg" id="success"></div>

      <form id="signup-form">
        <div class="field">
          <label for="name">Full name</label>
          <input type="text" id="name" placeholder="Jane Smith" required autocomplete="name">
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Min. 8 characters" required minlength="8" autocomplete="new-password">
        </div>
        <button type="submit" class="btn-primary" id="submit-btn">Create account</button>
      </form>

      <div class="divider">or</div>

      <button class="btn-google" id="google-btn">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 7.294C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
        Continue with Google
      </button>
    </div>

    <div class="auth-footer">
      Already have an account? <a href="/login.html">Sign in</a>
    </div>
  </div>

  <script>
    getSession().then(session => {
      if (session) window.location.href = '/';
    });

    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('success').style.display = 'none';
    }

    function showSuccess(msg) {
      const el = document.getElementById('success');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('error').style.display = 'none';
    }

    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Creating account…';
      document.getElementById('error').style.display = 'none';

      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const sb = await getSupabase();
        const { error } = await sb.auth.signUp({
          email,
          password,
          options: { data: { name } },
        });
        if (error) { showError(error.message); btn.disabled = false; btn.textContent = 'Create account'; return; }
        // Auto-confirm is on in dev — redirect directly; otherwise show check-email message
        const { data: { session } } = await sb.auth.getSession();
        if (session) {
          window.location.href = '/';
        } else {
          showSuccess('Check your email to confirm your account, then sign in.');
          btn.textContent = 'Account created';
        }
      } catch (err) {
        showError('Something went wrong. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Create account';
      }
    });

    document.getElementById('google-btn').addEventListener('click', async () => {
      const sb = await getSupabase();
      await sb.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + '/' },
      });
    });
  </script>
</body>
</html>
