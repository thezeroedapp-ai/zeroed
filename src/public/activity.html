<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zeroed — Activity</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="page">
  <div class="top-bar flex-between">
    <div>
      <h1>Activity</h1>
      <div class="sub" id="tx-sub"></div>
    </div>
    <button class="btn btn-outline btn-sm" onclick="syncNow(this)">Sync</button>
  </div>

  <div class="content">
    <div class="pills">
      <button class="pill active" data-filter="all">All</button>
      <button class="pill" data-filter="payment">Payments</button>
      <button class="pill" data-filter="interest">Interest</button>
      <button class="pill" data-filter="purchase">Purchases</button>
    </div>

    <div id="page-loading" class="loading-state">
      <div class="spinner"></div>
      <p>Loading transactions…</p>
    </div>
    <div id="page-error" class="error-state" style="display:none">
      <div class="error-icon">⚠️</div>
      <p>Could not load transactions</p>
      <small id="error-msg">Check that the server is running</small>
      <button class="btn btn-primary" onclick="load()">Try Again</button>
    </div>
    <div id="page-content" style="display:none">
      <div id="tx-list"></div>
      <div id="empty-state" style="display:none">
        <div class="empty">
          <div class="empty-icon">📋</div>
          <p>No transactions yet</p>
          <small>Connect a bank account and tap Sync to pull your transactions</small>
          <br><br>
          <button class="btn btn-primary" onclick="syncNow(this)">Sync Now</button>
        </div>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </a>
    <a href="accounts.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
      <span>Accounts</span>
    </a>
    <a href="plan.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
      <span>Plan</span>
    </a>
    <a href="goals.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
      <span>Goals</span>
    </a>
    <a href="activity.html" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <span>Activity</span>
    </a>
    <a href="settings.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l-.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span>Settings</span>
    </a>
  </nav>
</div>

<script>
const fmtD = n => new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',minimumFractionDigits:2,maximumFractionDigits:2}).format(n);

let allTx=[];

function show(state) {
  document.getElementById('page-loading').style.display = state==='loading' ? 'block' : 'none';
  document.getElementById('page-error').style.display   = state==='error'   ? 'block' : 'none';
  document.getElementById('page-content').style.display = state==='content' ? 'block' : 'none';
}

function txType(tx) {
  if (tx.amount < 0) return 'payment';
  const cat=(tx.category||'').toLowerCase();
  const desc=(tx.description||'').toLowerCase();
  if (cat.includes('interest')||desc.includes('interest charge')) return 'interest';
  return 'purchase';
}

function groupByMonth(list) {
  const g={};
  list.forEach(tx=>{const k=tx.date.slice(0,7);(g[k]=g[k]||[]).push(tx);});
  return g;
}

function renderTx(list) {
  const container=document.getElementById('tx-list');
  const empty=document.getElementById('empty-state');
  if (!list.length){container.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  const groups=groupByMonth(list);
  container.innerHTML=Object.keys(groups).sort((a,b)=>b.localeCompare(a)).map(month=>{
    const label=new Date(month+'-15').toLocaleDateString('en-US',{month:'long',year:'numeric'});
    const icons={payment:'💚',interest:'🔴',purchase:'🛍️'};
    const rows=groups[month].map(tx=>{
      const type=txType(tx);
      const isPayment=type==='payment';
      return `<div class="tx-row">
        <div class="tx-icon ${type}">${icons[type]||'💳'}</div>
        <div class="tx-body">
          <div class="tx-desc">${tx.description||'Transaction'}</div>
          <div class="tx-card">${tx.account_name||'Card'}</div>
        </div>
        <div class="tx-amount ${isPayment?'green':type==='interest'?'red':''}">
          ${isPayment?'-':''}${fmtD(Math.abs(tx.amount))}
        </div>
      </div>`;
    }).join('');
    return `<div class="tx-month">${label}</div><div class="card" style="padding:0 16px">${rows}</div>`;
  }).join('');
}

function applyFilter(f) {
  document.querySelectorAll('.pill').forEach(p=>p.classList.toggle('active',p.dataset.filter===f));
  renderTx(f==='all'?allTx:allTx.filter(tx=>txType(tx)===f));
}

async function load() {
  show('loading');
  try {
    const transactions = await fetch('/api/transactions?limit=200').then(r=>{
      if(!r.ok)throw new Error(`Server returned ${r.status}`);return r.json();
    });
    allTx=transactions;
    document.getElementById('tx-sub').textContent=transactions.length?`${transactions.length} transactions`:'No transactions synced';
    show('content');
    applyFilter(document.querySelector('.pill.active')?.dataset.filter||'all');
  } catch(e) {
    document.getElementById('error-msg').textContent = e.message;
    show('error');
  }
}

async function syncNow(btn) {
  const orig=btn.textContent; btn.textContent='Syncing…'; btn.disabled=true;
  try {
    const r=await fetch('/api/plaid/sync',{method:'POST'}).then(r=>r.json());
    await load();
    document.getElementById('tx-sub').textContent=`Synced ${r.transactions||0} new transactions`;
  } catch(e){alert('Sync failed: '+e.message);}
  finally{btn.textContent=orig;btn.disabled=false;}
}

document.querySelectorAll('.pill').forEach(p=>p.addEventListener('click',()=>applyFilter(p.dataset.filter)));
load();
</script>
</body>
</html>
